query PeopleQuery($where: PersonWhere) {
  people(where: $where) {
    uid
    display_name
    external
    identifiers {
      type
      value
    }
    names {
      first_names {
        language
        value
      }
      last_names {
        language
        value
      }
    }
    memberships {
      uid
      acronym
      names {
        language
        value
      }
      type
    }
  }
}
