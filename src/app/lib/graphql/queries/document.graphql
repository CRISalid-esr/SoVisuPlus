query TextualDocuments($where: TextualDocumentWhere) {
  textualDocuments(where: $where) {
    uid
    publication_date
    publication_date_start
    publication_date_end
    titles {
      language
      value
    }
    abstracts {
      language
      value
    }
    has_contributions {
      contributor {
        uid
        display_name
        external
        identifiers {
          type
          value
        }
        names {
          first_names {
            language
            value
          }
          last_names {
            language
            value
          }
        }
        memberships {
          uid
          acronym
          names {
            language
            value
          }
          type
        }
      }
    }
    abstracts {
      language
      value
    }
  }
}
