query Documents($where: DocumentWhere) {
  documents(where: $where) {
    uid
    document_type
    publication_date
    publication_date_start
    publication_date_end
    titles {
      language
      value
    }
    abstracts {
      language
      value
    }
    has_subjects {
      uri
      uid
      alt_labels {
        language
        value
      }
      pref_labels {
        language
        value
      }
    }
    has_contributions {
      roles
      contributor {
        uid
        display_name
        external
        identifiers {
          type
          value
        }
        names {
          first_names {
            language
            value
          }
          last_names {
            language
            value
          }
        }
        memberships {
          uid
          acronym
          names {
            language
            value
          }
          types
        }
      }
    }
    recorded_by {
      uid
      url
      harvester
      titles {
        language
        value
      }
    }
  }
}
