name: CD Push dev-main

on:
  push:
    branches:
      - 'dev-main'

env:
  NODE_VERSION: '24.14.0'
  DEV_LINE: 1.0
  DOCKERHUB_REPO: crisalidesr/sovisuplus

jobs:
  poeditor:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Generate translations files
        run: |
          npm run i18n:extract
          npm run i18n:compile

      - name: Commit files
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "action@github.com"
          git add src/locales/*
          git commit -m "Update translations" --no-verify || echo "Nothing to commit"

      - name: Delete branch poeditor-translations
        uses: dawidd6/action-delete-branch@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          branches: poeditor-translations
          soft_fail: 'true'

      - name: Create branch poeditor-translations
        uses: peterjgrainger/action-create-branch@v2.2.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          branch: poeditor-translations

      # Push back to dev-main
      - name: Push changes to dev-main
        uses: ad-m/github-push-action@master
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          branch: ${{ github.ref }}
          force: true

      - name: Push changes to poeditor-translations
        uses: ad-m/github-push-action@master
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          branch: poeditor-translations

  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push (dev tags)
        uses: docker/build-push-action@v5
        with:
          push: true
          tags: |
            ${{ env.DOCKERHUB_REPO }}:${{ env.DEV_LINE }}-dev
            ${{ env.DOCKERHUB_REPO }}:dev
          labels: |
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.ref.name=${{ github.ref_name }}
          context: .
          file: ./docker/staging/Dockerfile
          build-args: |
            GIT_COMMIT=${{ github.sha }}
            GIT_BRANCH=${{ github.ref_name }}
